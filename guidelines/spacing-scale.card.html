<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="8px base grid · tight takeaway economy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--off-white); color:var(--near-black); padding:22px 26px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .item { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
  .bar { background:var(--nagu-red); border:var(--keyline); height:auto; }
  .lab { font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const sizes = [['1',4],['2',8],['3',12],['4',16],['5',24],['6',32],['7',48],['8',64]];
    document.getElementById('row').innerHTML = sizes.map(([n,px])=>
      `<div class="item"><div class="bar" style="width:${px}px;height:${px}px"></div><span class="lab">${n} · ${px}</span></div>`
    ).join('');
  </script>
</body>
</html>
