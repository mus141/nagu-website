<!-- @dsCard group="Brand" viewport="700x220" name="Texture & Paint Strokes" subtitle="Grunge halftone overlay + hand paint-stroke accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background:var(--near-black); color:var(--off-white); padding:0; }
  .grid { display:grid; grid-template-columns:1fr 1fr; height:200px; }
  .cell { position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .cell + .cell { border-left:2px solid rgba(242,242,242,.15); }
  .tex { background:var(--off-white); }
  .tex img { width:100%; height:100%; object-fit:cover; opacity:.85; }
  .strokes { background:var(--off-white); flex-direction:column; gap:14px; padding:24px; box-sizing:border-box; }
  .strokes img { width:90%; }
  .lab { position:absolute; bottom:10px; left:12px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--near-black); background:var(--off-white); padding:2px 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell tex"><img src="../assets/elements/texture-overlay.jpg" alt="grunge texture"><span class="lab">Halftone / grunge overlay</span></div>
    <div class="cell strokes">
      <img src="../assets/elements/paint-stroke-01.png" alt="paint stroke 1">
      <img src="../assets/elements/paint-stroke-02.png" alt="paint stroke 2">
      <span class="lab">Paint-stroke accents</span>
    </div>
  </div>
</body>
</html>
