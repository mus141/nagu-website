<!-- @dsCard group="Type" viewport="700x200" name="Accent — Nagu JP (dual-language)" subtitle="Decorative katakana / kanji callouts only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--near-black); color: var(--off-white); padding:24px 28px; display:flex; gap:36px; align-items:center; }
  .blk { }
  .jp { font-family: var(--font-jp); font-size:48px; color:var(--nagu-red); line-height:1; }
  .en { font-family: var(--font-display); text-transform:uppercase; font-size:28px; letter-spacing:.02em; margin-top:6px; }
  .rule { width:2px; align-self:stretch; background:rgba(242,242,242,.18); }
  .note { font-size:12px; opacity:.6; max-width:200px; line-height:1.5; }
</style>
</head>
<body>
  <div class="blk">
    <div class="jp">大胆な味</div>
    <div class="en">Bold Flavor</div>
  </div>
  <div class="blk">
    <div class="jp">ナグ</div>
    <div class="en">NAGU</div>
  </div>
  <div class="rule"></div>
  <div class="note">EN primary, subtle JP accent. Never crowd three languages into one layout.</div>
</body>
</html>
