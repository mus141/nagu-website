<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--near-black); color: var(--off-white); padding:24px 28px; }
  .eyebrow { font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--red-bright); font-weight:700; }
  .big { font-family: var(--font-display); text-transform:uppercase; line-height:1.1; letter-spacing:.01em; margin:10px 0 0; }
  .l1 { font-size:56px; }
  .l2 { font-size:56px; color:var(--nagu-red); }
  .meta { font-family:var(--font-sans); font-size:12px; opacity:.6; margin-top:14px; }
</style>
</head>
<body>
  <div class="eyebrow">Display / Nagu Display</div>
  <div class="big l1">BOLD FLAVOR</div>
  <div class="big l2">BUILT DIFFERENT</div>
  <div class="meta">96 / 64 / 44px · weight 900 · line-height 0.92 · ALL CAPS · tight tracking</div>
</body>
</html>
