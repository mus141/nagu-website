<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAGU — Ordering App</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="./menu-data.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--ink-pure);
    background-image: radial-gradient(circle at 30% 20%, rgba(183,13,42,.22), transparent 55%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px; box-sizing: border-box;
  }
  .phone {
    width: 400px; height: 800px; max-height: calc(100vh - 56px);
    background: #000; border-radius: 44px; padding: 11px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 2px #000;
    flex: none;
  }
  .screen {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    border-radius: 34px; background: var(--off-white);
  }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 130px; height: 26px; background: #000; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; z-index: 60; }
  #app { width: 100%; height: 100%; }
  @keyframes naguSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <div id="app"></div>
    </div>
  </div>
  <script type="text/babel" src="./App.jsx"></script>
</body>
</html>
